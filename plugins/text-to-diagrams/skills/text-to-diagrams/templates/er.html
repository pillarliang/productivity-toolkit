<!DOCTYPE html>
<!-- ==================================================================
     DIAGRAM · ER / data model (kami palette)
     Entities + fields + relationships. One focal entity (the aggregate
     root or the table the conversation is about) wears the ink-blue
     accent. Join tables get a dashed border.
     Ported from cathrynlavery/diagram-design and reskinned to kami.
     ================================================================== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ER · kami diagram</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment:  #f5f4ed;
    --ivory:      #faf9f5;
    --near-black: #141413;
    --olive:      #504e49;
    --stone:      #6b6a64;
    --brand:      #1B365D;
    --brand-tint: #EEF2F7;
    --border:     #e8e6dc;

    --serif: Charter, Georgia, Palatino, serif;
    --sans:  var(--serif);
    --mono:  "JetBrains Mono", "SF Mono", Consolas, "TsangerJinKai02", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", monospace;
  }

  body {
    font-family: var(--sans);
    background: var(--parchment);
    color: var(--near-black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
  }

  .frame { max-width: 1100px; width: 100%; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: var(--serif);
    font-size: 1.9rem;
    font-weight: 500;
    letter-spacing: -0.3pt;
    line-height: 1.15;
    margin-bottom: 1.6rem;
  }

  svg { width: 100%; min-width: 880px; display: block; }

  .caption {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--olive);
    margin-top: 1rem;
    max-width: 52ch;
  }
</style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">ER · kami diagram</p>
    <h1>{{Content platform · data model}}</h1>

    <svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(20,20,19,0.08)"/>
        </pattern>
      </defs>

      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ==================================================================
           RELATIONSHIP LINES — drawn first, behind entities.
           ================================================================== -->
      <line x1="260" y1="240" x2="400" y2="240" stroke="#504e49" stroke-width="1"/>
      <line x1="640" y1="320" x2="780" y2="328" stroke="#504e49" stroke-width="1"/>
      <line x1="880" y1="248" x2="880" y2="280" stroke="#504e49" stroke-width="1"/>

      <!-- Cardinality labels (each behind a small parchment mask) -->
      <rect x="266" y="232" width="12" height="12" rx="2" fill="#f5f4ed"/>
      <text x="272" y="242" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle" font-weight="600">1</text>

      <rect x="378" y="232" width="16" height="12" rx="2" fill="#f5f4ed"/>
      <text x="386" y="242" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle" font-weight="600">N</text>

      <rect x="646" y="316" width="12" height="12" rx="2" fill="#f5f4ed"/>
      <text x="652" y="326" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle" font-weight="600">1</text>

      <rect x="760" y="324" width="16" height="12" rx="2" fill="#f5f4ed"/>
      <text x="768" y="334" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle" font-weight="600">N</text>

      <rect x="872" y="252" width="16" height="12" rx="2" fill="#f5f4ed"/>
      <text x="880" y="262" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle" font-weight="600">1</text>

      <rect x="872" y="268" width="16" height="12" rx="2" fill="#f5f4ed"/>
      <text x="880" y="278" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle" font-weight="600">N</text>

      <!-- Relationship labels -->
      <rect x="304" y="220" width="56" height="14" rx="2" fill="#f5f4ed"/>
      <text x="332" y="230" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.15em">WRITES</text>

      <rect x="688" y="300" width="56" height="14" rx="2" fill="#f5f4ed"/>
      <text x="716" y="310" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.15em">TAGGED</text>

      <!-- ==================================================================
           ENTITY: Author (standard)
           ================================================================== -->
      <rect x="60" y="160" width="200" height="160" rx="6" fill="#ffffff" stroke="#141413" stroke-width="1"/>
      <rect x="60" y="160" width="200" height="40" rx="6" fill="rgba(20,20,19,0.04)" stroke="none"/>
      <rect x="60" y="192" width="200" height="8" fill="rgba(20,20,19,0.04)"/>
      <line x1="60" y1="200" x2="260" y2="200" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
      <text x="76" y="176" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">ENTITY</text>
      <text x="76" y="192" fill="#141413" font-size="14" font-weight="600" font-family="inherit">Author</text>
      <text x="76" y="220" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace"># id</text>
      <text x="244" y="220" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">uuid</text>
      <text x="76" y="240" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">handle</text>
      <text x="244" y="240" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>
      <text x="76" y="260" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">name</text>
      <text x="244" y="260" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>
      <text x="76" y="280" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">bio</text>
      <text x="244" y="280" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>
      <text x="76" y="300" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">site_url</text>
      <text x="244" y="300" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>

      <!-- ==================================================================
           ENTITY: Article (FOCAL — aggregate root)
           ================================================================== -->
      <rect x="400" y="120" width="240" height="240" rx="6" fill="#EEF2F7" stroke="#1B365D" stroke-width="1"/>
      <rect x="400" y="120" width="240" height="40" rx="6" fill="rgba(27,54,93,0.10)" stroke="none"/>
      <rect x="400" y="152" width="240" height="8" fill="rgba(27,54,93,0.10)"/>
      <line x1="400" y1="160" x2="640" y2="160" stroke="rgba(27,54,93,0.40)" stroke-width="1"/>
      <text x="416" y="136" fill="#1B365D" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">ENTITY · AGGREGATE ROOT</text>
      <text x="416" y="152" fill="#141413" font-size="14" font-weight="600" font-family="inherit">Article</text>
      <text x="416" y="180" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace"># id</text>
      <text x="624" y="180" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">uuid</text>
      <text x="416" y="200" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">title</text>
      <text x="624" y="200" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>
      <text x="416" y="220" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">slug</text>
      <text x="624" y="220" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text · unique</text>
      <text x="416" y="240" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">body_mdx</text>
      <text x="624" y="240" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>
      <text x="416" y="260" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">published_at</text>
      <text x="624" y="260" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">timestamp</text>
      <text x="416" y="280" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">→ author_id</text>
      <text x="624" y="280" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">uuid</text>
      <text x="416" y="300" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">status</text>
      <text x="624" y="300" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">enum</text>
      <text x="416" y="320" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">og_image</text>
      <text x="624" y="320" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text · url</text>

      <!-- ==================================================================
           ENTITY: Tag (standard)
           ================================================================== -->
      <rect x="780" y="120" width="200" height="128" rx="6" fill="#ffffff" stroke="#141413" stroke-width="1"/>
      <rect x="780" y="120" width="200" height="40" rx="6" fill="rgba(20,20,19,0.04)" stroke="none"/>
      <rect x="780" y="152" width="200" height="8" fill="rgba(20,20,19,0.04)"/>
      <line x1="780" y1="160" x2="980" y2="160" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
      <text x="796" y="136" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">ENTITY</text>
      <text x="796" y="152" fill="#141413" font-size="14" font-weight="600" font-family="inherit">Tag</text>
      <text x="796" y="180" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace"># id</text>
      <text x="964" y="180" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">uuid</text>
      <text x="796" y="200" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">slug</text>
      <text x="964" y="200" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text · unique</text>
      <text x="796" y="220" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">name</text>
      <text x="964" y="220" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>
      <text x="796" y="240" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">description</text>
      <text x="964" y="240" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">text</text>

      <!-- ==================================================================
           ENTITY: ArticleTag (join table — dashed border)
           ================================================================== -->
      <rect x="780" y="280" width="200" height="96" rx="6" fill="rgba(20,20,19,0.04)" stroke="#504e49" stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="780" y="280" width="200" height="40" rx="6" fill="rgba(20,20,19,0.06)" stroke="none"/>
      <rect x="780" y="312" width="200" height="8" fill="rgba(20,20,19,0.06)"/>
      <line x1="780" y1="320" x2="980" y2="320" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
      <text x="796" y="296" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">JOIN</text>
      <text x="796" y="312" fill="#141413" font-size="14" font-weight="600" font-family="inherit">ArticleTag</text>
      <text x="796" y="340" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">→ article_id</text>
      <text x="964" y="340" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">uuid</text>
      <text x="796" y="360" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace">→ tag_id</text>
      <text x="964" y="360" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="end">uuid</text>

      <!-- ==================================================================
           LEGEND
           ================================================================== -->
      <line x1="40" y1="404" x2="960" y2="404" stroke="rgba(20,20,19,0.10)" stroke-width="0.8"/>
      <text x="40" y="420" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <rect x="40" y="436" width="14" height="10" rx="2" fill="#EEF2F7" stroke="#1B365D" stroke-width="1"/>
      <text x="60" y="444" fill="#504e49" font-size="8.5" font-family="inherit">Aggregate root</text>

      <rect x="180" y="436" width="14" height="10" rx="2" fill="#ffffff" stroke="#141413" stroke-width="1"/>
      <text x="200" y="444" fill="#504e49" font-size="8.5" font-family="inherit">Entity</text>

      <rect x="268" y="436" width="14" height="10" rx="2" fill="rgba(20,20,19,0.04)" stroke="#504e49" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="288" y="444" fill="#504e49" font-size="8.5" font-family="inherit">Join table</text>

      <text x="372" y="444" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace" font-weight="600">#</text>
      <text x="388" y="444" fill="#504e49" font-size="8.5" font-family="inherit">Primary key</text>

      <text x="476" y="444" fill="#141413" font-size="10" font-family="'JetBrains Mono', monospace" font-weight="600">→</text>
      <text x="492" y="444" fill="#504e49" font-size="8.5" font-family="inherit">Foreign key</text>

      <text x="584" y="444" fill="#504e49" font-size="10" font-family="'JetBrains Mono', monospace" font-weight="600">1 / N</text>
      <text x="624" y="444" fill="#504e49" font-size="8.5" font-family="inherit">Cardinality</text>
    </svg>

    <p class="caption">The accent goes on the aggregate root. Join tables get the dashed border so the reader can see at a glance which boxes carry meaning and which only carry foreign keys.</p>
  </div>
</body>
</html>
