<!DOCTYPE html>
<!-- ==================================================================
     DIAGRAM · Pyramid / Funnel (kami palette)
     Hierarchy of value, rarity, or conversion. Two orientations:
       - Pyramid (point up): apex = rarest / highest leverage
       - Funnel (point down): narrow end = conversion / smallest group
     One layer wears the ink-blue accent (apex of pyramid OR conversion
     layer of funnel).
     Ported from cathrynlavery/diagram-design and reskinned to kami.
     ================================================================== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pyramid · kami diagram</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment:  #f5f4ed;
    --ivory:      #faf9f5;
    --near-black: #141413;
    --olive:      #504e49;
    --stone:      #6b6a64;
    --brand:      #1B365D;
    --brand-tint: #EEF2F7;
    --border:     #e8e6dc;

    --serif: Charter, Georgia, Palatino, serif;
    --sans:  var(--serif);
    --mono:  "JetBrains Mono", "SF Mono", Consolas, "TsangerJinKai02", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", monospace;
  }

  body {
    font-family: var(--sans);
    background: var(--parchment);
    color: var(--near-black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
  }

  .frame { max-width: 1100px; width: 100%; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: var(--serif);
    font-size: 1.9rem;
    font-weight: 500;
    letter-spacing: -0.3pt;
    line-height: 1.15;
    margin-bottom: 1.6rem;
  }

  svg { width: 100%; min-width: 880px; display: block; }

  .caption {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--olive);
    margin-top: 1rem;
    max-width: 52ch;
  }
</style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Pyramid · kami diagram</p>
    <h1>{{Content pyramid · what compounds}}</h1>

    <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(20,20,19,0.08)"/>
        </pattern>
      </defs>

      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- Left axis: direction of rarity -->
      <line x1="100" y1="40" x2="100" y2="320" stroke="rgba(20,20,19,0.30)" stroke-width="1"/>
      <polygon points="96,40 104,40 100,28" fill="rgba(20,20,19,0.45)"/>
      <text x="80" y="216" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.22em" text-anchor="middle" transform="rotate(-90 80 216)">RARER · FEWER · COMPOUNDS ↑</text>

      <!-- ==================================================================
           LAYERS — trapezoids, base→apex. Widths shrink linearly so the
           apex sits at the top center.
           Layer heights: 64. Y baselines: 280 / 216 / 152 / 24 (apex tip).
           ================================================================== -->

      <!-- Base layer: Short posts -->
      <polygon points="244,280 756,280 820,344 180,344" fill="rgba(20,20,19,0.05)" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
      <text x="500" y="308" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Short posts</text>
      <text x="500" y="324" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">daily · ~200 words</text>
      <text x="836" y="316" fill="#6b6a64" font-size="9" font-family="'JetBrains Mono', monospace" letter-spacing="0.1em">~240/yr</text>

      <!-- L3: Essays -->
      <polygon points="308,216 692,216 756,280 244,280" fill="rgba(20,20,19,0.05)" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
      <text x="500" y="244" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Essays</text>
      <text x="500" y="260" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">weekly · 800–1,500 words</text>
      <text x="776" y="252" fill="#6b6a64" font-size="9" font-family="'JetBrains Mono', monospace" letter-spacing="0.1em">~48/yr</text>

      <!-- L2: Long-form guides -->
      <polygon points="372,152 628,152 692,216 308,216" fill="rgba(20,20,19,0.05)" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
      <text x="500" y="180" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Long-form guides</text>
      <text x="500" y="196" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">quarterly · 4,000+ words</text>
      <text x="716" y="188" fill="#6b6a64" font-size="9" font-family="'JetBrains Mono', monospace" letter-spacing="0.1em">~4/yr</text>

      <!-- Apex: Flagship book — FOCAL (single triangle, consistent slope) -->
      <polygon points="500,24 628,152 372,152" fill="#EEF2F7" stroke="#1B365D" stroke-width="1"/>
      <text x="500" y="120" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Flagship book</text>
      <text x="500" y="136" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">every 3–5 years</text>
      <text x="656" y="112" fill="#1B365D" font-size="9" font-family="'JetBrains Mono', monospace" letter-spacing="0.1em">the apex</text>

      <!-- Footnote -->
      <text x="500" y="384" fill="#504e49" font-size="8.5" font-family="inherit" text-anchor="middle" font-style="italic">The base funds the apex. The apex defines the base.</text>

      <!-- ==================================================================
           LEGEND
           ================================================================== -->
      <line x1="40" y1="436" x2="960" y2="436" stroke="rgba(20,20,19,0.10)" stroke-width="0.8"/>
      <text x="40" y="452" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <rect x="40" y="464" width="16" height="12" fill="#EEF2F7" stroke="#1B365D" stroke-width="1"/>
      <text x="64" y="474" fill="#504e49" font-size="8.5" font-family="inherit">Apex — rarest, highest leverage</text>

      <rect x="280" y="464" width="16" height="12" fill="rgba(20,20,19,0.05)" stroke="rgba(20,20,19,0.25)" stroke-width="1"/>
      <text x="304" y="474" fill="#504e49" font-size="8.5" font-family="inherit">Supporting layer — the volume work</text>

      <text x="560" y="474" fill="#504e49" font-size="8.5" font-family="inherit" font-style="italic">Layer width is honest: narrower = rarer shipping cadence.</text>
    </svg>

    <p class="caption">Width carries information. The widest band is the cheapest, most frequent work; the apex is rare and slow. If you flatten widths into equal slabs you've turned a pyramid into a layer cake.</p>
  </div>
</body>
</html>
