<!DOCTYPE html>
<!-- ==================================================================
     DIAGRAM · Sequence (kami palette)
     Time-ordered messages between actors. Lifelines drop vertically;
     activation bars show control duration; messages flow top→down.
     One focal actor in ink-blue.
     Ported from cathrynlavery/diagram-design and reskinned to kami.
     ================================================================== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sequence · kami diagram</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment:  #f5f4ed;
    --ivory:      #faf9f5;
    --near-black: #141413;
    --olive:      #504e49;
    --stone:      #6b6a64;
    --brand:      #1B365D;
    --brand-tint: #EEF2F7;
    --border:     #e8e6dc;

    --serif: Charter, Georgia, Palatino, serif;
    --sans:  var(--serif);
    --mono:  "JetBrains Mono", "SF Mono", Consolas, "TsangerJinKai02", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", monospace;
  }

  body {
    font-family: var(--sans);
    background: var(--parchment);
    color: var(--near-black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
  }

  .frame { max-width: 1100px; width: 100%; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: var(--serif);
    font-size: 1.9rem;
    font-weight: 500;
    letter-spacing: -0.3pt;
    line-height: 1.15;
    margin-bottom: 1.6rem;
  }

  svg { width: 100%; min-width: 880px; display: block; }

  .caption {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--olive);
    margin-top: 1rem;
    max-width: 52ch;
  }
</style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Sequence · kami diagram</p>
    <h1>{{Article request, cold cache}}</h1>

    <svg viewBox="0 0 1000 584" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(20,20,19,0.08)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#504e49"/>
        </marker>
        <marker id="arrow-brand" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#1B365D"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ==================================================================
           LIFELINES — dashed vertical lines from each actor, behind everything.
           Actor centers: 128, 352, 584, 800
           ================================================================== -->
      <line x1="128" y1="128" x2="128" y2="488" stroke="rgba(20,20,19,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="352" y1="128" x2="352" y2="488" stroke="rgba(20,20,19,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="584" y1="128" x2="584" y2="488" stroke="rgba(20,20,19,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="800" y1="128" x2="800" y2="488" stroke="rgba(20,20,19,0.22)" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- ==================================================================
           ACTIVATION BARS — w=8 rects on lifelines showing control duration.
           Drawn before message arrows so arrows land on their edges.
           ================================================================== -->
      <rect x="348" y="180" width="8" height="232" fill="rgba(20,20,19,0.06)" stroke="#504e49" stroke-width="0.8"/>
      <rect x="580" y="236" width="8" height="120" fill="rgba(20,20,19,0.06)" stroke="#504e49" stroke-width="0.8"/>

      <!-- ==================================================================
           MESSAGES — time flows top→down. Draw before labels.
           ================================================================== -->

      <!-- M1: Reader → Edge (request) -->
      <line x1="128" y1="176" x2="352" y2="176" stroke="#504e49" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- M2: Edge → Origin (cache miss) -->
      <line x1="352" y1="232" x2="580" y2="232" stroke="#504e49" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- M3: Origin self-message (render) -->
      <path d="M 588 284 L 624 284 L 624 316 L 588 316" fill="none" stroke="#504e49" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- M4: Origin → Edge (return HTML, dashed) -->
      <line x1="580" y1="352" x2="356" y2="352" stroke="#504e49" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

      <!-- M5: Edge → Reader (FOCAL primary success) -->
      <line x1="348" y1="408" x2="128" y2="408" stroke="#1B365D" stroke-width="1.4" marker-end="url(#arrow-brand)"/>

      <!-- M6: Reader → Async (beacon, dashed) -->
      <line x1="128" y1="464" x2="800" y2="464" stroke="#504e49" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

      <!-- ==================================================================
           MESSAGE LABELS — each with an opaque parchment mask.
           ================================================================== -->
      <rect x="188" y="160" width="104" height="12" rx="2" fill="#f5f4ed"/>
      <text x="240" y="170" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.1em">GET /ARTICLES/SLUG</text>

      <rect x="416" y="216" width="100" height="12" rx="2" fill="#f5f4ed"/>
      <text x="466" y="226" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.1em">CACHE MISS · ORIGIN</text>

      <rect x="632" y="292" width="72" height="12" rx="2" fill="#f5f4ed"/>
      <text x="668" y="302" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.1em">RENDER MDX</text>

      <rect x="420" y="336" width="96" height="12" rx="2" fill="#f5f4ed"/>
      <text x="468" y="346" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.1em">200 · HTML + MAX-AGE</text>

      <rect x="192" y="392" width="96" height="12" rx="2" fill="#f5f4ed"/>
      <text x="240" y="402" fill="#1B365D" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.1em">200 · EDGE-CACHED</text>

      <rect x="648" y="448" width="96" height="12" rx="2" fill="#f5f4ed"/>
      <text x="696" y="458" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.1em">PAGEVIEW BEACON</text>

      <!-- ==================================================================
           ACTOR BOXES — drawn after arrows/labels.
           Each actor: 144–160 wide × 56 tall. Centers: 128, 352, 584, 800.
           ================================================================== -->

      <!-- Actor 1: Reader (external) -->
      <rect x="56" y="72" width="144" height="56" rx="6" fill="#f5f4ed"/>
      <rect x="56" y="72" width="144" height="56" rx="6" fill="rgba(94,93,89,0.08)" stroke="#6b6a64" stroke-width="1"/>
      <text x="78" y="89" fill="#6b6a64" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">USER</text>
      <text x="128" y="104" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Reader</text>
      <text x="128" y="120" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">Browser</text>

      <!-- Actor 2: Edge (cloud) -->
      <rect x="280" y="72" width="144" height="56" rx="6" fill="#f5f4ed"/>
      <rect x="280" y="72" width="144" height="56" rx="6" fill="rgba(20,20,19,0.03)" stroke="rgba(20,20,19,0.30)" stroke-width="1"/>
      <text x="304" y="89" fill="#6b6a64" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">EDGE</text>
      <text x="352" y="104" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Cloudflare</text>
      <text x="352" y="120" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">Pages · cache</text>

      <!-- Actor 3: Origin (FOCAL) -->
      <rect x="504" y="72" width="160" height="56" rx="6" fill="#f5f4ed"/>
      <rect x="504" y="72" width="160" height="56" rx="6" fill="#EEF2F7" stroke="#1B365D" stroke-width="1"/>
      <text x="528" y="89" fill="#1B365D" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">ORIGIN</text>
      <text x="584" y="104" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Astro Origin</text>
      <text x="584" y="120" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">SSR + MDX</text>

      <!-- Actor 4: Async (optional · dashed) -->
      <rect x="728" y="72" width="144" height="56" rx="6" fill="#f5f4ed"/>
      <rect x="728" y="72" width="144" height="56" rx="6" fill="rgba(20,20,19,0.02)" stroke="rgba(20,20,19,0.22)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="750" y="89" fill="#6b6a64" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">ASYNC</text>
      <text x="800" y="104" fill="#141413" font-size="12" font-weight="600" font-family="inherit" text-anchor="middle">Analytics</text>
      <text x="800" y="120" fill="#504e49" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">Beacon · async</text>

      <!-- ==================================================================
           LEGEND
           ================================================================== -->
      <line x1="56" y1="504" x2="944" y2="504" stroke="rgba(20,20,19,0.10)" stroke-width="0.8"/>
      <text x="56" y="520" fill="#504e49" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <rect x="56" y="540" width="14" height="10" rx="2" fill="#EEF2F7" stroke="#1B365D" stroke-width="1"/>
      <text x="76" y="548" fill="#504e49" font-size="8.5" font-family="inherit">Focal actor</text>

      <rect x="188" y="536" width="4" height="18" fill="rgba(20,20,19,0.06)" stroke="#504e49" stroke-width="0.8"/>
      <text x="200" y="548" fill="#504e49" font-size="8.5" font-family="inherit">Activation</text>

      <line x1="308" y1="546" x2="336" y2="546" stroke="#504e49" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="344" y="548" fill="#504e49" font-size="8.5" font-family="inherit">Standard message</text>

      <line x1="476" y1="546" x2="504" y2="546" stroke="#504e49" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="512" y="548" fill="#504e49" font-size="8.5" font-family="inherit">Return / async</text>

      <line x1="652" y1="546" x2="680" y2="546" stroke="#1B365D" stroke-width="1.4" marker-end="url(#arrow-brand)"/>
      <text x="688" y="548" fill="#504e49" font-size="8.5" font-family="inherit">Primary response</text>
    </svg>

    <p class="caption">Time runs top to bottom. The focal actor — Astro Origin — wears the ink-blue accent because the request resolution turns on whether the cache hits its lifeline at all.</p>
  </div>
</body>
</html>
