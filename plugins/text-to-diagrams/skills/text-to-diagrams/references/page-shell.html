<!DOCTYPE html>
<!-- ==================================================================
     PAGE SHELL · text-to-diagrams
     Wrap multiple <svg> diagrams in this single-page layout.
     - Replace {{PAGE_TITLE}} with the analyzed text's overall title
     - Replace {{RATIONALE}} with one paragraph explaining the diagram choices
     - Repeat <section class="diagram-block">…</section> for each diagram
     - Replace the colophon if you want a different signature
     ================================================================== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="generator" content="text-to-diagrams">
<title>{{PAGE_TITLE}}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment:  #f5f4ed;
    --ivory:      #faf9f5;
    --near-black: #141413;
    --olive:      #504e49;
    --stone:      #6b6a64;
    --brand:      #1B365D;
    --brand-tint: #EEF2F7;
    --border:     #e8e6dc;

    --serif: Charter, Georgia, Palatino, "TsangerJinKai02", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", serif;
    --sans:  var(--serif);
    --mono:  "JetBrains Mono", "SF Mono", Consolas, "TsangerJinKai02", "Source Han Serif SC", monospace;
  }

  body {
    font-family: var(--sans);
    background: var(--parchment);
    color: var(--near-black);
    padding: 4rem 2rem;
    line-height: 1.5;
  }

  .page { max-width: 1040px; margin: 0 auto; }

  .page-eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.5rem;
  }

  .page-title {
    font-family: var(--serif);
    font-size: 2.4rem;
    font-weight: 500;
    letter-spacing: -0.4pt;
    line-height: 1.15;
    margin-bottom: 1.2rem;
  }

  .page-rationale {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1rem;
    color: var(--olive);
    max-width: 64ch;
    margin-bottom: 3.2rem;
  }

  /* Optional: insert <h2 class="section-title">…</h2> between groups of
     diagram-blocks when the page has many figures (>6). Lets the page read
     as a chaptered document instead of a flat list. */
  .section-title {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 500;
    letter-spacing: -0.3pt;
    line-height: 1.2;
    color: var(--near-black);
    margin: 4rem 0 2rem;
    padding-top: 2.4rem;
    border-top: 1px solid var(--border);
  }

  .section-title:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }

  .diagram-block {
    margin-bottom: 4rem;
    padding-bottom: 3rem;
    border-bottom: 1px solid var(--border);
  }

  .diagram-block:last-of-type {
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }

  .diagram-eyebrow {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.4rem;
  }

  .diagram-title {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: -0.2pt;
    line-height: 1.2;
    margin-bottom: 1.4rem;
  }

  .diagram-block svg { width: 100%; display: block; margin-bottom: 1rem; }

  .diagram-caption {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--olive);
    max-width: 56ch;
  }

  .colophon {
    margin-top: 4rem;
    padding-top: 1.6rem;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--stone);
  }
</style>
</head>
<body>
  <main class="page">
    <p class="page-eyebrow">Diagrams · {{N}} figure(s)</p>
    <h1 class="page-title">{{PAGE_TITLE}}</h1>
    <p class="page-rationale">{{RATIONALE}}</p>

    <!-- Repeat one block per diagram. Eyebrow format: "Figure N · Type".
         For long pages (>6 diagrams), insert
         <h2 class="section-title">Section name</h2>
         between groups of diagram-blocks to chapter the document. -->
    <section class="diagram-block">
      <p class="diagram-eyebrow">Figure 1 · {{DIAGRAM_TYPE_NAME}}</p>
      <h2 class="diagram-title">{{DIAGRAM_TITLE}}</h2>
      <!-- paste the <svg>…</svg> block extracted from templates/<type>.html -->
      <p class="diagram-caption">{{CAPTION}}</p>
    </section>

    <p class="colophon">Generated by text-to-diagrams · kami palette</p>
  </main>
</body>
</html>
